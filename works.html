<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoonHeejeong | Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --inverse-bg-color: #fff;
            --inverse-text-color: #000;
            --main-bg-color: #000;
            --main-text-color: #fff;
            --highlight-color: #888;
            --modal-bg-color: rgba(5, 5, 5, 0.98);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body, html {
            width: 100%; min-height: 100vh;
            background-color: var(--inverse-bg-color); color: var(--inverse-text-color);
            font-family: 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding-top: 8vw; 
        }
        nav#top-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 2vw 5vw; display: flex; justify-content: space-between;
            z-index: 100; pointer-events: auto;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .nav-left { display: flex; gap: 3vw; }
        nav#top-nav a {
            color: var(--inverse-text-color); text-decoration: none; text-transform: uppercase;
            font-size: 0.85vw; font-weight: 400; letter-spacing: 0.1em;
            transition: opacity 0.3s ease;
        }
        nav#top-nav a:hover { opacity: 0.5; }
        .row { width: 100%; }
        section#works-section {
            position: relative; width: 100%; 
            padding: 0 5vw 0; 
        }
        .works-title {
            font-family: 'Playfair Display', serif; font-size: 5.5vw;
            font-style: italic; font-weight: 400; text-align: center;
            margin-bottom: 3vw; text-transform: uppercase;
        }
        .category-filters {
            display: flex; justify-content: center; gap: 4vw;
            margin-bottom: 6vw; flex-wrap: wrap;
        }
        .filter-btn {
            background: none; border: none; font-size: 1.1vw;
            font-family: 'Pretendard', 'Helvetica Neue', sans-serif; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #ccc; cursor: pointer; transition: color 0.3s ease;
            padding-bottom: 0.2vw; border-bottom: 1px solid transparent; 
        }
        .filter-btn:hover { color: #555; }
        .filter-btn.active { color: var(--inverse-text-color); border-bottom: 1px solid transparent; }
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(28%, 1fr));
            gap: 5vw 3vw; 
            align-items: start;
            min-height: 60vh;
        }
        .work-item {
            position: relative; cursor: pointer; display: none;
            opacity: 0; transform: translateY(30px);
            transition: transform 0.4s ease, opacity 0.6s ease;
        }
        .work-item.show { display: block; }
        .work-item.reveal { opacity: 1; transform: translateY(0); }
        .work-item:hover { transform: translateY(-5px); }
        .img-wrapper { overflow: hidden; width: 100%; background: #f5f5f5; aspect-ratio: 4/5; position: relative; }
        .img-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%); transition: filter 0.5s ease, transform 0.5s ease;
        }
        .work-item:hover .img-wrapper img { filter: grayscale(0%); transform: scale(1.03); }
        .work-label {
            margin-top: 1.5vw; display: flex; justify-content: space-between; align-items: baseline;
            border-top: none; padding-top: 0vw; 
        }
        .work-item-title {
            font-size: 1.1vw; font-weight: 500; color: var(--inverse-text-color);
            transition: all 0.4s ease; margin: 0;
            font-family: 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-style: normal;
        }
        .work-item:hover .work-item-title {
            font-family: 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-style: normal; font-weight: 500; font-size: 1.1vw;
            letter-spacing: normal;
        }
        .work-item-category { 
            font-size: 0.8vw; color: var(--highlight-color); text-transform: uppercase; 
            letter-spacing: 0.05em; margin: 0; 
        }
        .series-icon {
            position: absolute; top: 1vw; right: 1vw;
            background: rgba(0,0,0,0.5); color: #fff; font-size: 0.8vw;
            padding: 0.3vw 0.6vw; border-radius: 20px;
        }
        #project-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--modal-bg-color); color: var(--main-text-color); z-index: 2000;
            display: flex; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #project-modal.active { opacity: 1; pointer-events: auto; }
        .modal-close { display: none; }
        .modal-content { display: flex; width: 100%; height: 100%; padding: 6vw 5vw 4vw; gap: 5vw; }
        .modal-left { 
            width: 65%; height: 100%; position: relative; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .modal-left img { max-width: 100%; max-height: 90%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1); border: none; color: var(--main-text-color);
            width: 3.5vw; height: 3.5vw; border-radius: 50%; font-size: 1.5vw;
            cursor: pointer; display: none; transition: background 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-nav:hover { background: rgba(255, 255, 255, 0.3); }
        #modal-prev { left: 0; }
        #modal-next { right: 0; }
        #modal-counter { margin-top: 1vw; font-size: 0.9vw; color: var(--highlight-color); letter-spacing: 0.1em; display: none; margin-bottom: 0; }
        .modal-right { width: 35%; display: flex; flex-direction: column; justify-content: center; }
        #modal-title { 
            font-family: 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-style: normal; font-weight: 700; font-size: 2.5vw; 
            margin-bottom: 1.5vw; line-height: 1.2; margin-top: 0; 
        }
        #modal-caption, #modal-desc { 
            font-family: 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.1vw; line-height: 1.7; color: #ccc; font-weight: 300; 
            text-transform: none; letter-spacing: normal; margin: 0 0 1.5vw 0; 
            white-space: pre-line; 
        }
        #modal-desc a {
            color: #fff;
            text-decoration: underline;
            font-weight: 400;
        }
        #modal-desc a:hover {
            color: #ccc;
        }
        #contact-transition {
            position: relative; width: 100%; height: 40vh; margin-top: 10vw;
            background: linear-gradient(to bottom, var(--inverse-bg-color) 0%, var(--main-bg-color) 100%);
        }
        footer#contact-section {
            position: relative; width: 100%; height: 60vh; 
            background-color: var(--main-bg-color); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .contact-row { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .marquee-wrapper { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 5vw; }
        .marquee {
            display: inline-block; font-size: 8vw; font-weight: bold; font-style: italic;
            font-family: 'Playfair Display', serif; color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            animation: marqueeText 20s linear infinite;
        }
        .marquee span { margin-right: 2vw; }
        @keyframes marqueeText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .contact-links { display: flex; gap: 4vw; position: relative; z-index: 2; }
        .contact-links a {
            color: var(--main-text-color); font-size: 1.5vw; text-decoration: none; text-transform: uppercase;
            letter-spacing: 0.1em; border-bottom: 1px solid transparent; transition: border-bottom 0.3s ease;
        }
        .contact-links a:hover { border-bottom: 1px solid var(--main-text-color); }
        .footer-copy { position: absolute; bottom: 3vw; font-size: 0.8vw; color: #555; margin: 0; }
        @media only screen and (max-width: 833px) {
            .works-grid { grid-template-columns: repeat(auto-fill, minmax(45%, 1fr)); }
            .modal-content { flex-direction: column; overflow-y: auto; padding-top: 15vw; }
            .modal-left, .modal-right { width: 100%; height: auto; }
            .modal-left { min-height: 50vh; }
        }
    </style>
</head>

    <script>
        const paintingData = [
            { images: ['w1.jpg', 'w2.jpg'], title: 'a part of light', caption: '2025, oil pastel on panel, 112x145.5cm', desc: '우리가 눈에 보이지 않는 에너지, 즉 빛으로 이루어져 있으며 서로에게 영향을 주고받으며 연결되어 있다는 세계관에 주목해왔다. 이 작업은 “우리는 빛이며, 서로 연결되어 있다”는 믿음에서 출발한다.\n\n빛은 분명 가시적이지만 동시에 실체를 온전히 붙잡을 수 없는 존재다. 물리적 경계를 넘어 확산되고, 닿는 대상에 따라 서로 다른 흔적을 남긴다. 윤희정은 이러한 빛을 인간 관계의 흐름이자, 존재가 지닌 진동으로 이해한다.\n\n화면 속 빛의 형상은 자전거, 아파트, 가로등과 같은 일상적인 빛의 장면들에서 출발해, 오일파스텔의 물성을 통해 형성되었다. 긁고, 쌓고, 문지르는 반복적인 행위는 빛이 퍼지고 겹쳐지는 과정을 닮아 있다. 이후 칼을 사용해 빛의 결을 하나하나 다듬으며, 보이지 않던 흐름을 더욱 선명하게 드러낸다. 이러한 행위는 빛의 연결성을 강화하는 동시에, 관계가 형성되고 변화하는 과정을 시각화한다.' },
            { images: ['w3.jpg', 'w4.jpg'], title: 'to gather', caption: '2025, oil pastel on panel, 112×145.5cm', desc: '우리가 눈에 보이지 않는 에너지, 즉 빛으로 이루어져 있으며 서로에게 영향을 주고받으며 연결되어 있다는 세계관에 주목해왔다. 이 작업은 “우리는 빛이며, 서로 연결되어 있다”는 믿음에서 출발한다.\n\n빛은 분명 가시적이지만 동시에 실체를 온전히 붙잡을 수 없는 존재다. 물리적 경계를 넘어 확산되고, 닿는 대상에 따라 서로 다른 흔적을 남긴다. 윤희정은 이러한 빛을 인간 관계의 흐름이자, 존재가 지닌 진동으로 이해한다.\n\n화면 속 빛의 형상은 자전거, 아파트, 가로등과 같은 일상적인 빛의 장면들에서 출발해, 오일파스텔의 물성을 통해 형성되었다. 긁고, 쌓고, 문지르는 반복적인 행위는 빛이 퍼지고 겹쳐지는 과정을 닮아 있다. 이후 칼을 사용해 빛의 결을 하나하나 다듬으며, 보이지 않던 흐름을 더욱 선명하게 드러낸다. 이러한 행위는 빛의 연결성을 강화하는 동시에, 관계가 형성되고 변화하는 과정을 시각화한다.' },
            { images: ['w5.jpg'], title: 'Corner of Memories', caption: '2025, oil pastel on panel, 111×162cm', desc: '우리가 눈에 보이지 않는 에너지, 즉 빛으로 이루어져 있으며 서로에게 영향을 주고받으며 연결되어 있다는 세계관에 주목해왔다. 이 작업은 “우리는 빛이며, 서로 연결되어 있다”는 믿음에서 출발한다.\n\n빛은 분명 가시적이지만 동시에 실체를 온전히 붙잡을 수 없는 존재다. 물리적 경계를 넘어 확산되고, 닿는 대상에 따라 서로 다른 흔적을 남긴다. 윤희정은 이러한 빛을 인간 관계의 흐름이자, 존재가 지닌 진동으로 이해한다.\n\n화면 속 빛의 형상은 자전거, 아파트, 가로등과 같은 일상적인 빛의 장면들에서 출발해, 오일파스텔의 물성을 통해 형성되었다. 긁고, 쌓고, 문지르는 반복적인 행위는 빛이 퍼지고 겹쳐지는 과정을 닮아 있다. 이후 칼을 사용해 빛의 결을 하나하나 다듬으며, 보이지 않던 흐름을 더욱 선명하게 드러낸다. 이러한 행위는 빛의 연결성을 강화하는 동시에, 관계가 형성되고 변화하는 과정을 시각화한다.' },
            { images: ['w6.jpg'], title: '기억에 머무르다', caption: '2024, oil on canvas, 92x73cm', desc: '자연 속에서 경험했던 순간 즉, 자연과 하나가 되는 느낌과 감정을 색감으로 극대화 하였다.\n\n대상을 인지하고 파악하는 것과 전혀 다른 색으로 전환되고, 빛과 어둠의 관계가 모호해짐으로써 이미지가 생소하고 낯설어 지게 하였다. 정형화된 일상의 시각을 바꾸어 꿈같은 허상과 실재의 구분을 흐리게 만들었다. 일상의 똑같은 풍경, 평범함 속에 낯선 풍경이나 꿈속의 한 장면 같은 이미지로 구현하였다.' },
            { images: ['w7.jpg'], title: 'ordinary days', caption: '2024, oil on canvas, 92x73cm', desc: '자연 속에서 경험했던 순간 즉, 자연과 하나가 되는 느낌과 감정을 색감으로 극대화 하였다.(색채연구)\n\n대상을 인지하고 파악하는 것과 전혀 다른 색으로 전환되고, 빛과 어둠의 관계가 모호해짐으로써 이미지가 생소하고 낯설어 지게 하였다. 정형화된 일상의 시각을 바꾸어 꿈같은 허상과 실재의 구분을 흐리게 만들었다. 일상의 똑같은 풍경, 평범함 속에 낯선 풍경이나 꿈속의 한 장면 같은 이미지로 구현하였다.' },
            { images: ['w8.jpg'], title: 'F_A_R', caption: '2024, oil on canvas, 92x73cm', desc: '자연 속에서 경험했던 순간 즉, 자연과 하나가 되는 느낌과 감정을 색감으로 극대화 하였다.(색채연구)\n\n대상을 인지하고 파악하는 것과 전혀 다른 색으로 전환되고, 빛과 어둠의 관계가 모호해짐으로써 이미지가 생소하고 낯설어 지게 하였다. 정형화된 일상의 시각을 바꾸어 꿈같은 허상과 실재의 구분을 흐리게 만들었다. 일상의 똑같은 풍경, 평범함 속에 낯선 풍경이나 꿈속의 한 장면 같은 이미지로 구현하였다.' },
            { images: ['w9.jpg'], title: 'Aㅏ과', caption: '2025, oil on panel, 20x17.5cm', desc: '인간의 에너지가 가시화된다면, 그것은 하나의 방향이 아닌 360도로 확산되는 형태일 것이라는 상상에서 이 작업은 출발한다. 이러한 방사형 에너지는 인간을 넘어, 지구 역시 유사한 방식으로 에너지를 방출하고 있을 것이라는 생각으로 확장된다.\n\n그 에너지의 형상은 우연히도 사과의 단면을 연상시킨다. 이 유사성은 “우리는 사과 속에 살고 있는 것은 아닐까”라는 장난스러운 질문으로 이어지며, 세계를 바라보는 인식의 스케일을 흔든다. 거대한 우주와 미시적인 생명체의 경계는 이 지점에서 느슨해진다.\n\n사과라는 일상적이고 작은 생명체 안에 우주와 자연의 구조를 투영함으로써, 모든 존재가 저마다의 세계와 에너지를 품고 있음을 시각화한다. 거대함과 미세함, 장난스러운 상상과 근원적인 질문 사이를 오가며, 인간과 자연, 우주가 하나의 연속된 구조 안에 놓여 있음을 암시한다.' },
            { images: ['w10.jpg'], title: '동', caption: '2025, oil on panel, 20x17.5cm', desc: '‘기운생동(氣韻生動)’은 작업자가 품은 기운이 화면을 통해 관람자에게 전이된다는 의미를 지닌, 동양화 이론에서 유래한 개념이다. 이는 단순한 형상의 재현을 넘어, 보이지 않는 흐름과 생명력을 전달하는 회화의 태도를 말한다.\n\n나는 ‘연결됨’이라는 기운를 의식하며 작업을 진행했고, 이 작업은 그 기운이 실제로 전이될 수 있는지를 실험하는 시도이다. 화면에 드러난 형상은 지구를 상공에서 바라볼 때 보이는 위도와 경도의 선들을 연상시키며, 이는 지리적 표식이자 세계를 이해하기 위한 인간의 체계이다.\n\n본 작업은 이러한 선의 구조를 통해 인간과 인간, 지역과 지역이 전 지구적으로 연결되어 있음을 확장해 제시한다. 보이지 않는 기운의 흐름과 가시적인 선의 체계가 겹쳐지는 지점에서, 개인의 감각은 세계적 차원의 연결로 이어지며, 관람자는 화면을 통해 그 기운의 진동을 경험하게 된다.' },
            { images: ['w11.jpg', 'w12.jpg'], title: '자기', caption: '2025, oil pastel on panel, 91x91cm', desc: '한 인물은 물속에, 다른 한 인물은 물 밖에 위치한다. 두 존재는 서로 다른 상태에 놓여 있지만, 물이라는 요소를 통해 보이지 않게 연결되어 있다. 물은 생존을 위한 필수 조건인 동시에, 끊임없이 흐르며 모든 것을 잇는 매개로 존재한다.\n\n화면을 가로지르는 붉은 선은 자기장의 방향을 설명하는 도식에서 차용된 형상이다. 이는 물리적 현상을 설명하는 과학적 표이지만, 이 작업에서는 너와 나, 개체와 개체를 잇는 보이지 않는 흐름의 표식처럼 작동한다. 물의 연결성과 자기장이 지닌 보이지 않는 힘은 이 지점에서 서로 겹쳐진다.\n\n물과 자기장이라는 서로 다른 성질의 흐름을 하나의 화면 안에 병치함으로써, 존재들이 어떻게 분리된 상태에서도 연결되어 있는지를 시각화한다. 제목이자 개념인 ‘자기’는 세 가지 의미를 동시에 품는다. 자신의 기운을 뜻하는 ‘자기’, 물리학적 개념인 ‘자기장’의 약어, 그리고 친밀한 호칭으로서의 ‘자기’. 이 중첩된 언어는 관계, 에너지, 그리고 감정의 층위를 하나의 장면 안에 불러온다.' },
            { images: ['w13.jpg'], title: '<다른 이>', caption: '2025, 판넬 위 오일파스텔, 65x53cm', desc: '우리가 눈에 보이지 않는 에너지, 즉 빛으로 이루어져 있으며 서로에게 영향을 주고받으며 연결되어 있다는 세계관에 주목해왔다. 이 작업은 “우리는 빛이며, 서로 연결되어 있다”는 믿음에서 출발한다.\n\n빛은 분명 가시적이지만 동시에 실체를 온전히 붙잡을 수 없는 존재다. 물리적 경계를 넘어 확산되고, 닿는 대상에 따라 서로 다른 흔적을 남긴다. 윤희정은 이러한 빛을 인간 관계의 흐름이자, 존재가 지닌 진동으로 이해한다.\n\n화면 속 빛의 형상은 자전거, 아파트, 가로등과 같은 일상적인 빛의 장면들에서 출발해, 오일파스텔의 물성을 통해 형성되었다. 긁고, 쌓고, 문지르는 반복적인 행위는 빛이 퍼지고 겹쳐지는 과정을 닮아 있다. 이후 칼을 사용해 빛의 결을 하나하나 다듬으며, 보이지 않던 흐름을 더욱 선명하게 드러낸다. 이러한 행위는 빛의 연결성을 강화하는 동시에, 관계가 형성되고 변화하는 과정을 시각화한다.' },
            { images: ['w14.jpg'], title: '<Wish>', caption: '2024', desc: '하늘을 보며 소원을 빌고있었는데, 우연히 별똥별을 보게되어 그 장면을 그리게되었다. 추상화시켜 염원을 담은 그림' },
            { images: ['w15.jpg'], title: 'forwordto', caption: '2024, 캔버스에 유화, 162x97cm', desc: '우리는 모두 자연 속에 살고 있고, 자연과 인간은 분리 할 수 없다. 즉 인간은 자연의 일부이다. 모든 것이 연결되어있고, 인간과 자연 우주가 하나로 연결되어있다는 도교의 물아일체 사상을 표현하고자 했다. 자연과 하나가 되는 느낌과 감정을 색감으로 극대화 하는 색감연구라는 큰 타이틀로 작업을 이어나가고 있다.\n\n이번 작업은 산에서 자연과 사람, 강아지의 풍경을 담아보았다. 눈이 쌓인 산속에서의 장면이 미지의 세계로 향하는 듯 자연과 대상 사이의 알 수 없는 조화를 느꼈다. 그리하여 일상의 풍경, 평범함 속에 낯선 풍경이나 꿈속의 한 장면 같은 이미지로 구현하고자 하였다.\n\n대상을 인지하고 파악하는 것과 전혀 다른 색으로 전환하고 어느 공간인지 시간인지 빛과 어둠의 관계들이 모호해지게 하면서 이미지가 생소하고 낯설어 지게 하였다. 또한 생명체와 자연이 하나임을 표현하고자 구분되지 않도록 정확하지 않고 배경에 스며들듯이 표현했다.' },

            { images: ['w17.jpg'], title: 'A x is', caption: '2025, oil pastel on panel, 91x116cm', desc: '우리는 3차원에 살아가며, 누구나 그 안에서 보이지 않는 제약을 안고 존재한다. 이 제약은 추상적인 개념이지만, 손이라는 신체를 통해 우리는 3차원을 가리키고, 방향을 설정하며, 세계를 인식한다.\n\n본 작업은 3차원의 방향성을 나타내는 손의 형태를 출발점으로 삼아, 물리학에서 자기장의 방향을 설명하는 플래밍의 왼손 법칙을 시각적 표로 차용한다. 엄지, 검지, 중지가 이루는 방향성은 시계의 구조와 겹쳐지며, 시간과 공간, 그리고 물리적 질서가 하나의 체계로 얽혀 있음을 암시한다.\n\n그러나 이 작업에서 왼손 법칙은 기존의 과학적 설명과는 반대 방향으로 제시된다. 이는 절대적인 법칙이나 보편적 질서에 대한 전복이자, 각자가 처한 차원과 인식이 서로 다름을 드러내기 위한 선택이다. 과학의 공식처럼 정해진 삶의 방향이 아니라, 개인이 스스로 만들어가는 고유한 법칙과 사고의 흐름을 시각적으로 드러내고자 한다.' },
            { images: ['w18.jpg', 'w19.jpg'], title: '지금-여기', caption: '2025, oil pastel on panel, 65x91cm', desc: '민코프스키의 시공간 개념은 시간과 공간이 서로 분리된 차원이 아니라, 하나의 연속된 구조로서 동시에 존재한다는 인식에서 출발한다. 그의 이론에서 하나의 ‘순간’은 단일한 점이 아니라, 시간과 공간이 겹쳐진 하나의 시공간적 사건이다.\n\n나는 이 개념을 바탕으로, 우리가 살아가는 ‘지금-여기’의 한 시점을 개인적인 순간이 아닌 우주적 스케일에서 다시 바라보고자 했다. 현재의 상태는 단순한 현재형이 아니라, 과거와 미래, 공간적 위치와 시간적 흐름이 중첩된 복합적인 시공간으로 인식된다.\n\n본 작업은 이러한 시공간의 중첩성을 시각화하려는 시도이다. 순간은 고정되지 않고, 확장되며, 관람자는 화면 속에서 하나의 시점이 지닌 다층적인 시간과 공간의 흔적을 동시에 마주하게 된다. 이를 통해 우리는 ‘존재한다’는 감각 자체가 얼마나 복합적인 시공간 위에 놓여 있는지를 다시 인식하게 된다.' }

            { images: ['g7.jpg', 'g8.jpg', 'g9.jpg', 'g10.jpg', 'g11.jpg', 'g12.jpg'], title: '이어 매거진', caption: '그래픽 디자인, 2024', desc: '점과 선이 만나, 우리의 궤적을 잇다\n우리의 삶은 무수히 많은 점과 선의 연결로 이루어집니다. 흩어져 있던 두 개의 단어가 만날\n때, 익숙했던 풍경은 전혀 새로운 의미를 품은 채 다가오기도 합니다. 매거진 <이어>는\n그 수많은 궤적 속에서 항상 ‘예술’이라는 단단한 축을 중심에 두고, 세상의 다양한 조각들을\n끊임없이 ‘이어’ 보려 합니다. 때로는 인공지능 기술(AI)과 예술을 엮어 미래의 캔버스를\n상상할 수도 있고, 매일 마주하는 우리의 식탁과 예술을 교차시켜 일상의 미학을 탐구할 수도\n있습니다. <이어>는 매호 예술과 맞닿을 수 있는 세상의 또 다른 무언가를 연결하며,\n그 경계에서 피어나는 무한한 가능성을 조명하는 매거진입니다.' }
        ];
        const worksGrid = document.getElementById('works-grid');
        
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        const allWorksData = [
            ...paintingData.map(item => ({ ...item, categoryId: 'painting' })),
            ...photoData.map(item => ({ ...item, categoryId: 'photography' })),
            ...drawingData.map(item => ({ ...item, categoryId: 'drawing' })),
            ...designData.map(item => ({ ...item, categoryId: 'design' }))
        ];
        allWorksData.sort(() => Math.random() - 0.5);
        allWorksData.forEach(item => {
            const thumb = item.images[0]; 
            const dataImagesAttr = item.images.length > 1 ? `data-images="${item.images.join(', ')}"` : '';
            const seriesIconHTML = item.images.length > 1 ? `<span class="series-icon" style="display:block;">+${item.images.length}</span>` : '';
            const encodedDesc = item.desc.replace(/"/g, '&quot;');
            const displayTitle = escapeHTML(item.title);
            const categoryName = item.categoryId;
            const itemHTML = `
                <div class="row work-item" data-category="${categoryName}" data-title="${displayTitle}" data-caption="${item.caption}" data-desc="${encodedDesc}" ${dataImagesAttr}>
                    <div class="img-wrapper">
                        <img src="${thumb}" alt="${displayTitle}" loading="lazy">
                        ${seriesIconHTML}
                    </div>
                    <div class="work-label">
                        <h2 class="work-item-title">${displayTitle}</h2>
                        <p class="work-item-category">${categoryName}</p>
                    </div>
                </div>`;
            worksGrid.insertAdjacentHTML('beforeend', itemHTML);
        });
        const filterBtns = document.querySelectorAll('.filter-btn');
        const workItems = document.querySelectorAll('.work-item');
        function updateLayout(filterValue) {
            let visibleCount = 0;
            workItems.forEach(item => {
                item.classList.remove('show', 'reveal');
                const category = item.getAttribute('data-category');
                if (filterValue === 'all' || category === filterValue) {
                    item.classList.add('show');
                    setTimeout(() => item.classList.add('reveal'), visibleCount * 50); 
                    visibleCount++;
                }
            });
            setTimeout(() => ScrollTrigger.refresh(), 500);
        }
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(f => f.classList.remove('active'));
                btn.classList.add('active');
                updateLayout(btn.getAttribute('data-filter'));
            });
        });
        
        updateLayout('all');
        const modal = document.getElementById('project-modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalCaption = document.getElementById('modal-caption');
        const modalDesc = document.getElementById('modal-desc');
        const modalPrev = document.getElementById('modal-prev');
        const modalNext = document.getElementById('modal-next');
        const modalCounter = document.getElementById('modal-counter');
        let currentSeries = [];
        let currentImageIndex = 0;
        function updateModalImage() {
            modalImg.src = currentSeries[currentImageIndex];
            modalCounter.innerText = `${currentImageIndex + 1} / ${currentSeries.length}`;
        }
        workItems.forEach(item => {
            item.addEventListener('click', () => {
                const singleImgSrc = item.querySelector('img').src;
                const imagesAttr = item.getAttribute('data-images');
                
                if (imagesAttr) {
                    currentSeries = imagesAttr.split(',').map(s => s.trim());
                } else {
                    currentSeries = [singleImgSrc];
                }
                currentImageIndex = 0;
                modalTitle.innerHTML = item.getAttribute('data-title');
                modalCaption.innerHTML = item.getAttribute('data-caption');
                modalDesc.innerHTML = item.getAttribute('data-desc');
                if(!item.getAttribute('data-desc')) {
                    modalDesc.style.display = 'none';
                } else {
                    modalDesc.style.display = 'block';
                }
                if (currentSeries.length > 1) {
                    modalPrev.style.display = 'flex';
                    modalNext.style.display = 'flex';
                    modalCounter.style.display = 'block';
                } else {
                    modalPrev.style.display = 'none';
                    modalNext.style.display = 'none';
                    modalCounter.style.display = 'none';
                }
                updateModalImage();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; 
            });
        });
        modal.addEventListener('click', (e) => {
            if (!e.target.closest('img, h1, h2, p, button')) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
        modalPrev.addEventListener('click', (e) => {
            e.stopPropagation(); 
            currentImageIndex = (currentImageIndex > 0) ? currentImageIndex - 1 : currentSeries.length - 1;
            updateModalImage();
        });
        modalNext.addEventListener('click', (e) => {
            e.stopPropagation();
            currentImageIndex = (currentImageIndex < currentSeries.length - 1) ? currentImageIndex + 1 : 0;
            updateModalImage();
        });
    </script>
</body>
</html>
